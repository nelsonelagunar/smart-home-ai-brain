# Smart Home AI Brain - Settings Configuration

# Application settings
app:
  name: "Smart Home AI Brain"
  version: "0.1.0"
  debug: false
  log_level: "INFO"

# Server settings
server:
  host: "0.0.0.0"
  port: 8000

# Ollama settings
ollama:
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 30

# Database settings
database:
  url: "sqlite:///data/smart_home.db"

# RabbitMQ settings
rabbitmq:
  url: "amqp://guest:guest@localhost/"
  exchanges:
    events: "smart_home.events"
    commands: "smart_home.commands"
    automation: "smart_home.automation"

# Device discovery settings
discovery:
  timeout: 5
  scan_interval: 300  # seconds between scans

# Pattern learning settings
learning:
  enabled: true
  min_occurrences: 3
  pattern_window: 86400  # 24 hours in seconds

# Anomaly detection settings
anomaly:
  enabled: true
  threshold: 3.0  # standard deviations

# Automation settings
automation:
  enabled: true
  check_interval: 60  # seconds