<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow effect -->
  <rect x="100" y="0" width="400" height="630" fill="url(#glow)"/>
  
  <!-- Brain icon (simplified) -->
  <g transform="translate(80, 200)" filter="url(#shadow)">
    <circle cx="100" cy="115" r="90" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Neural network nodes -->
    <circle cx="60" cy="80" r="8" fill="#6366f1"/>
    <circle cx="140" cy="80" r="8" fill="#6366f1"/>
    <circle cx="60" cy="150" r="8" fill="#8b5cf6"/>
    <circle cx="140" cy="150" r="8" fill="#8b5cf6"/>
    <circle cx="100" cy="115" r="12" fill="#a78bfa"/>
    <!-- Connections -->
    <line x1="60" y1="80" x2="100" y2="115" stroke="#6366f1" stroke-width="2"/>
    <line x1="140" y1="80" x2="100" y2="115" stroke="#6366f1" stroke-width="2"/>
    <line x1="60" y1="150" x2="100" y2="115" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="140" y1="150" x2="100" y2="115" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="60" y1="80" x2="60" y2="150" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4"/>
    <line x1="140" y1="80" x2="140" y2="150" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4"/>
  </g>
  
  <!-- House icon -->
  <g transform="translate(80, 350)">
    <path d="M 100 20 L 180 70 L 180 140 L 20 140 L 20 70 Z" fill="none" stroke="#64748b" stroke-width="2"/>
    <rect x="70" y="100" width="60" height="40" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="100" cy="50" r="15" fill="none" stroke="#f59e0b" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="350" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white">
    Smart Home AI Brain
  </text>
  
  <!-- Subtitle -->
  <text x="350" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Sistema inteligente de automatización del hogar con IA
  </text>
  
  <!-- Features -->
  <g transform="translate(350, 280)">
    <!-- Feature 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="#1e1e3f" stroke="#6366f1" stroke-width="1"/>
      <text x="90" y="26" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">🔌 Auto-Discovery</text>
    </g>
    
    <!-- Feature 2 -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="#1e1e3f" stroke="#8b5cf6" stroke-width="1"/>
      <text x="90" y="26" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">🤖 IA Local (Ollama)</text>
    </g>
    
    <!-- Feature 3 -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="#1e1e3f" stroke="#6366f1" stroke-width="1"/>
      <text x="90" y="26" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">📊 Pattern Learning</text>
    </g>
    
    <!-- Feature 4 -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="#1e1e3f" stroke="#8b5cf6" stroke-width="1"/>
      <text x="90" y="26" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">🔒 100% Local</text>
    </g>
  </g>
  
  <!-- Tech Stack -->
  <g transform="translate(350, 360)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Tech Stack:</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#3178c6"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Python</text>
    </g>
    
    <g transform="translate(90, 20)">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#059669"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">FastAPI</text>
    </g>
    
    <g transform="translate(180, 20)">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#7c3aed"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Ollama</text>
    </g>
    
    <g transform="translate(270, 20)">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#f97316"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">SQLite</text>
    </g>
    
    <g transform="translate(360, 20)">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#2496ed"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Docker</text>
    </g>
  </g>
  
  <!-- Architecture diagram -->
  <g transform="translate(350, 450)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Architecture:</text>
    
    <!-- Simple flow -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="100" height="50" rx="6" fill="#1e1e3f" stroke="#6366f1" stroke-width="1"/>
      <text x="50" y="30" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Web UI</text>
    </g>
    
    <text x="115" y="45" font-family="system-ui, sans-serif" font-size="16" fill="#6366f1">→</text>
    
    <g transform="translate(130, 20)">
      <rect x="0" y="0" width="100" height="50" rx="6" fill="#1e1e3f" stroke="#8b5cf6" stroke-width="1"/>
      <text x="50" y="30" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">API</text>
    </g>
    
    <text x="245" y="45" font-family="system-ui, sans-serif" font-size="16" fill="#8b5cf6">→</text>
    
    <g transform="translate(260, 20)">
      <rect x="0" y="0" width="100" height="50" rx="6" fill="#1e1e3f" stroke="#6366f1" stroke-width="1"/>
      <text x="50" y="30" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Core</text>
    </g>
    
    <text x="375" y="45" font-family="system-ui, sans-serif" font-size="16" fill="#6366f1">→</text>
    
    <g transform="translate(390, 20)">
      <rect x="0" y="0" width="100" height="50" rx="6" fill="#1e1e3f" stroke="#8b5cf6" stroke-width="1"/>
      <text x="50" y="30" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Devices</text>
    </g>
  </g>
  
  <!-- Status badge -->
  <g transform="translate(350, 540)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
    <text x="60" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">🚧 In Development</text>
  </g>
  
  <!-- GitHub link -->
  <g transform="translate(490, 540)">
    <rect x="0" y="0" width="280" height="32" rx="16" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-width="1"/>
    <text x="140" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" text-anchor="middle" font-weight="600">github.com/nelsonelagunar/smart-home-ai-brain</text>
  </g>
  
  <!-- Author -->
  <text x="850" y="580" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="end">
    Nelson Laguna • Azure DevOps Engineer
  </text>
</svg>